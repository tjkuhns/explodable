# Trusted source domains for citation resolution.
#
# Used by scripts/backfill_manifestation_urls.py and (eventually) the live
# citation processor to decide whether a search-engine hit is credible
# enough to footnote. If a URL's host isn't on one of these lists, we'd
# rather show "URL pending" than risk citing a blog aggregator.
#
# Tiers are searched in priority order — academic first, then gov/think
# tanks, then business press, then journalism, then practitioner. The
# first tier that returns a title-matching hit wins.
#
# To add a domain: append it to the appropriate tier. Use root domains
# (hbr.org, not www.hbr.org). Subdomains are matched automatically via
# the `.domain/` check in _is_authoritative_url.

tiers:
  # ── Tier 1: academic publishers, indexes, preprint servers ──
  academic:
    - doi.org
    - pubmed.ncbi.nlm.nih.gov
    - ncbi.nlm.nih.gov
    - pmc.ncbi.nlm.nih.gov
    - semanticscholar.org
    - scholar.google.com
    - arxiv.org
    - ssrn.com
    - papers.ssrn.com
    - osf.io
    - biorxiv.org
    - medrxiv.org
    - psyarxiv.com
    # Major publishers
    - nature.com
    - science.org
    - sciencemag.org
    - sciencedirect.com
    - springer.com
    - link.springer.com
    - wiley.com
    - onlinelibrary.wiley.com
    - tandfonline.com
    - sagepub.com
    - journals.sagepub.com
    - cambridge.org
    - oup.com
    - academic.oup.com
    - mitpressjournals.org
    - mitpress.mit.edu
    - journals.uchicago.edu
    - plos.org
    - journals.plos.org
    - frontiersin.org
    - mdpi.com
    - elsevier.com
    # Psychology / behavioral specialty
    - apa.org
    - psycnet.apa.org
    - psychologicalscience.org
    - behavioralscientist.org
    # Economics / finance specialty
    - aeaweb.org
    - nber.org
    - econlit.org
    # Indexes & identifiers
    - orcid.org
    - crossref.org
    - openalex.org

  # ── Tier 2: universities (.edu already matched by TLD fallback, but
  #           explicit listing catches .ac.uk / .ac.jp and lets us
