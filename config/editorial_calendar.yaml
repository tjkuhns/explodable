# ============================================================
# Explodable Content Pipeline — Runtime Config
# ============================================================
# This file is consumed by `src/content_pipeline/graph.py` at
# the `calendar_trigger` node. The pipeline reads the retrieval
# parameters for the active brand.
#
# Retired 2026-04-18: publishing cadence, social variants,
# multi-brand staggering, Substack/Buttondown wiring. The product
# is Explodable-only; operator drives publishing manually from
# `drafts/` via the chat-native `generate-content` skill.
# ============================================================

pipeline_version: "2.0"

brands:
  explodable:
    display_name: "Explodable"
    status: active
    voice_profile: "voice_profile_explodable.yaml"

    # KB retrieval parameters — consumed by kb_retriever_node
    retrieval:
      decay_weight: 0.30           # recency weight in scoring formula
      semantic_weight: 0.70        # semantic similarity weight
      half_life_days: 14           # findings older than 14 days decay by half
      min_confidence: 0.45         # floor below which findings are skipped
      max_findings_per_draft: 8

    # BVCS (voice compliance) thresholds — consumed by bvcs_scorer_node
    voice_compliance:
      scoring_rubric: "bvcs_rubric_explodable.yaml"
      pass_threshold: 70
      max_revision_attempts: 3
      score_disclosure: delayed    # score shown to operator AFTER read
